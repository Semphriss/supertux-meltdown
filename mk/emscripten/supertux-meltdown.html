<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <title>SuperTux Meltdown</title>
    <style>
      html, body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }

      /*
        Note that I kept from Emscripten: Keep borders and padding to 0, else
        it will break mouse events.
      */
      #canvas {
        border: none;
        background-color: black;
        width: 100%;
        height: 100%;
      }

      #spinner {
        height: 30px;
        width: 30px;
        margin: 20px;
        display: inline-block;
        vertical-align: top;

        -webkit-animation: rotation .8s linear infinite;
        -moz-animation: rotation .8s linear infinite;
        -o-animation: rotation .8s linear infinite;
        animation: rotation 0.8s linear infinite;

        border-left: 5px solid #777;
        border-right: 5px solid #777;
        border-bottom: 5px solid #777;
        border-top: 5px solid #7770;

        border-radius: 100%;
        background: none;
      }

      @-webkit-keyframes rotation {
        from { -webkit-transform: rotate(0deg); }
        to { -webkit-transform: rotate(360deg); }
      }
      @-moz-keyframes rotation {
        from { -moz-transform: rotate(0deg); }
        to { -moz-transform: rotate(360deg); }
      }
      @-o-keyframes rotation {
        from { -o-transform: rotate(0deg); }
        to { -o-transform: rotate(360deg); }
      }
      @keyframes rotation {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      #status {
        display: inline-block;
        vertical-align: top;
        margin-top: 30px;
        margin-right: 20px;
        font-weight: bold;
        color: #777;
      }

      #progress {
        height: 20px;
        width: 300px;
      }

      #output {
        width: 80%;
        height: 200px;
        margin: 0 auto;
        border: 10px solid black;
        padding: 10px;
        display: block;
        background-color: black;
        color: white;
        font-family: 'Lucida Console', Monaco, monospace;
        outline: none;
        position: fixed;
        bottom: 0;
        transform: translate(calc(50vw - 50%), calc(100% - 8px));
        transition: .25s transform;
        border-radius: 12px 12px 0 0;
        box-shadow: 0px 0px 10px #7777;
        resize: vertical; /* Useful if #output is a textarea */
        overflow-y: scroll;
      }

      #output:hover {
        transform: translate(calc(50vw - 50%), 0);
      }

      .center-all {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="center-all">
      <div>
        <div id="spinner"></div>
        <div id="status">Downloading...</div>
      </div>
      <div>
        <progress value="0" max="100" id="progress" hidden=""></progress>
      </div>
    </div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"
            tabindex="-1">
      <p>
        Your browser does not support HTML5 canvases; please use a modern
        browser.
      </p>
    </canvas>
    <p id="output" rows="8" readonly="readonly" spellcheck="false"></p>

    <script type='text/javascript'>
      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement = document.getElementById('spinner');
      var element = document.getElementById('output');

      function doPrint(text, isErr) {
        console[isErr ? "warn" : "log"](text);

        if (element) {
          var col = isErr ? 'red' : 'white';

          if (text.startsWith('[DEBUG]')) {
            col = 'grey';
          } else if (text.startsWith('[INFO]')) {
            col = 'lightgrey';
          } else if (text.startsWith('[WARN]')) {
            col = 'yellow';
          } else if (text.startsWith('[ERROR]')) {
            col = 'red';
          } else if (text.startsWith('[FATAL]')) {
            col = 'darkred';
          }

          text = text.replace(/&/g, "&amp;");
          text = text.replace(/</g, "&lt;");
          text = text.replace(/>/g, "&gt;");
          text = text.replace('\n', '<br>', 'g');

          // Scroll down after adding a line, but not if the user is away
          const bump = element.scrollTop + element.clientHeight
                                                        >= element.scrollHeight;

          element.innerHTML += "<span style='color:" + col + ";'>" + text
                                + "</span><br/>";

          if (bump)
            element.scrollTop = element.scrollHeight;
        }
      }

      var Module = {
        preRun: [],
        postRun: [],
        print(text) {
          if (arguments.length > 1)
            text = Array.prototype.slice.call(arguments).join(' ');

          doPrint(text, false);
        },
        printErr(text) {
          if (arguments.length > 1)
            text = Array.prototype.slice.call(arguments).join(' ');

          doPrint(text, true);
        },
        canvas: (function() {
          var canvas = document.getElementById('canvas');

          // Emscripten recommends handling this properly, but idk what to do
          canvas.addEventListener("webglcontextlost", function(e) {
            alert('WebGL context lost. You will need to reload the page.');
            e.preventDefault();
          }, false);

          window.addEventListener('resize', function(e) {
            // FIXME: SDL does not receive the resize events properly
            //canvas.width = canvas.clientWidth;
            //canvas.height = canvas.clientHeight;
          });

          return canvas;
        })(),
        setStatus: function(text) {
          if (!Module.setStatus.last)
            Module.setStatus.last = { time: Date.now(), text: '' };

          if (text === Module.setStatus.last.text)
            return;

          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30)
            return; // if this is a progress update, skip it if too soon

          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2])*100;
            progressElement.max = parseInt(m[4])*100;
            progressElement.hidden = false;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) spinnerElement.style.display = 'none';
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... ('
                                  + (this.totalDependencies-left)
                                  + '/' + this.totalDependencies + ')'
                                : 'All downloads complete.');
        }
      };
      Module.setStatus('Downloading...');
      window.onerror = function (message, source, line, col, error) {
        if (typeof error == "number") {
          console.log(Module.ccall('getExceptionMessage', 'string', ['number'],
                      [error]));
        }

        Module.setStatus('An error occured: ' + message + '\n(' + source + ':'
                                              + line + ':' + col + ')');
        spinnerElement.style.display = 'none';
        Module.setStatus = function(text) {
          if (text)
            console.error('[post-exception status] ' + text);
        };
      };
    </script>
    <script async type="text/javascript" src="supertux-meltdown.js"></script>
  </body>
</html>
